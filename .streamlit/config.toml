# Configuracion para publicar en la red (varios usuarios via navegador).
[server]
address = "0.0.0.0"
port = 8501
headless = true
enableXsrfProtection = true
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
# Paleta del Manual de marca American Advisor
primaryColor = "#2884C7"            # azul (PANTONE 3015)
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EDEDED"  # gris claro (PANTONE 5245)
textColor = "#3C3C3C"               # gris oscuro (PANTONE 425)
